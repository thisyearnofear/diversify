# DiversiFi — Log Rotation Configuration
#
# Rotate PM2 and nginx logs on the Hetzner server to prevent disk
# from filling up over time.
#
# Install:
#   sudo cp scripts/logrotate-diversifi.conf /etc/logrotate.d/diversifi
#   sudo logrotate -d /etc/logrotate.d/diversifi  # dry-run to verify
# =============================================================================

# ── PM2 logs (app output & errors) ──────────────────────────────────────────
/home/deploy/.pm2/logs/diversifi-api-*.log {
    daily
    rotate 14
    size 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0644 deploy deploy
}

# ── PM2 PM2 internal logs ────────────────────────────────────────────────────
/home/deploy/.pm2/pm2.log {
    weekly
    rotate 4
    size 100M
    compress
    delaycompress
    missingok
    notifempty
}

# ── Nginx access & error logs ───────────────────────────────────────────────
/var/log/nginx/diversifi-api-*.log {
    daily
    rotate 30
    size 100M
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}

/var/log/nginx/access.log /var/log/nginx/error.log {
    weekly
    rotate 4
    size 100M
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}
